name: CD

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'

on:
  workflow_dispatch:

jobs:

  release:
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    name: Release To Maven Central
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.OSSRH_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Actions"

      - name: Download Native Bundle
        run: |
          RUN_ID=$(gh run list --workflow "Native Libraries Bundle" --status success --limit 1 --json databaseId --jq ".[0].databaseId")
          echo "Latest successful run ID: $RUN_ID"
          gh run download $RUN_ID -n native-bundle -D .native
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Release With Maven
        run: |
          ./mvnw release:prepare release:perform \
          -Darguments="-Dnative.basedir=${{github.workspace}}/.native"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.OSSRH_GPG_PASSPHRASE }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
