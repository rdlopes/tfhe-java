name: CI

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    name: Package With Maven
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Download Native Bundle
        run: |
          RUN_ID=$(gh run list --workflow "Native Libraries Bundle" --status success --limit 1 --json databaseId --jq ".[0].databaseId")
          echo "Latest successful run ID: $RUN_ID"
          gh run download $RUN_ID -n native-bundle -D native-bundle
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Native Bundle
        run: |
          mkdir -p .native/libs
          cp -r native-bundle/libs/* .native/libs/
          mkdir -p .native/bindings
          cp -r native-bundle/bindings/* .native/bindings/

      - name: Compile with Maven
        run: ./mvnw package

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-targets
          path: |
            **/target/
            !**/target/native/
            .native/
          include-hidden-files: true
          retention-days: 1

  document:
    name: Living Documentation
    runs-on: ubuntu-latest
    needs: [ build ]
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-targets

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - run: ./mvnw verify
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_ARGS: "-Dsurefire.skip=true"
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: 'tfhe-api/target/cukedoctor'
      - id: deployment
        uses: actions/deploy-pages@v5
